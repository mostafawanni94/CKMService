name: pro_totaal_service
description: Pro Totaal Service Employee Mobile App

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # UI Components
  cupertino_icons: ^1.0.8
  
  # State Management
  provider: ^6.1.2
  
  # Network & API
  http: ^1.2.2
  dio: ^5.7.0
  
  # Local Storage
  shared_preferences: ^2.3.3
  flutter_secure_storage: ^9.2.2
  
  # Forms & Validation
  flutter_form_builder: ^10.2.0
  form_builder_validators: ^11.2.0
  
  # Camera & Images
  image_picker: ^1.1.2
  camera: ^0.11.0+2
  file_picker: ^8.0.0
  
  # Date & Time
  intl: ^0.20.2
  
  # Navigation
  go_router: ^14.6.2
  
  # Push Notifications
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.5
  
  # Authentication
  local_auth: ^2.3.0
  
  # Utilities
  connectivity_plus: ^6.1.1
  url_launcher: ^6.3.1
  share_plus: ^10.1.2
  
  # Modern Searchable Dropdowns
  dropdown_search: ^6.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/fonts/
  
  # fonts:
  #   - family: Outfit
  #     fonts:
  #       - asset: assets/fonts/Outfit-Regular.ttf
  #       - asset: assets/fonts/Outfit-Bold.ttf
  #         weight: 700
